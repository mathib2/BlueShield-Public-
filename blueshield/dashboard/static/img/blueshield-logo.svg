<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- BlueShield — Military-grade iconic logo
       Design language: Anduril Lattice + CrowdStrike + NSA seal
       - Hexagonal frame (defense/tactical aesthetic)
       - Inner shield with stylized BT glyph
       - Sharp geometric corner cuts (chevron lines)
       - Corner tick marks (targeting reticle) -->

  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f1e4a"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Inner glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer hexagonal frame (tactical) -->
  <polygon points="60,4 108,32 108,88 60,116 12,88 12,32"
           fill="none" stroke="url(#hexGrad)" stroke-width="2.5" stroke-linejoin="miter"/>

  <!-- Inner hexagon (darker, filled) -->
  <polygon points="60,14 98,36 98,84 60,106 22,84 22,36"
           fill="#0a1529" stroke="#1e40af" stroke-width="0.8" opacity="0.95"/>

  <!-- Corner reticle marks (4 corners of the hex — targeting aesthetic) -->
  <g stroke="#60a5fa" stroke-width="1.5" stroke-linecap="square">
    <!-- Top-left -->
    <line x1="18" y1="36" x2="24" y2="36"/>
    <line x1="18" y1="36" x2="18" y2="42"/>
    <!-- Top-right -->
    <line x1="96" y1="36" x2="102" y2="36"/>
    <line x1="102" y1="36" x2="102" y2="42"/>
    <!-- Bottom-left -->
    <line x1="18" y1="84" x2="24" y2="84"/>
    <line x1="18" y1="78" x2="18" y2="84"/>
    <!-- Bottom-right -->
    <line x1="96" y1="84" x2="102" y2="84"/>
    <line x1="102" y1="78" x2="102" y2="84"/>
  </g>

  <!-- Central shield (heraldic, pointed bottom) -->
  <path d="M 60 28 L 82 38 L 82 64 Q 82 82 60 92 Q 38 82 38 64 L 38 38 Z"
        fill="url(#shieldGrad)" stroke="#60a5fa" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Bluetooth glyph inside the shield (stylized rune) -->
  <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="square" stroke-linejoin="miter" fill="none" filter="url(#glow)">
    <!-- Vertical axis -->
    <line x1="60" y1="42" x2="60" y2="80"/>
    <!-- Upper triangle: center → top-right → middle -->
    <line x1="60" y1="42" x2="70" y2="52"/>
    <line x1="70" y1="52" x2="60" y2="61"/>
    <!-- Lower triangle: middle → bottom-right → bottom-center -->
    <line x1="60" y1="61" x2="70" y2="70"/>
    <line x1="70" y1="70" x2="60" y2="80"/>
    <!-- Lower-left diagonal → center -->
    <line x1="50" y1="52" x2="60" y2="61"/>
    <line x1="50" y1="70" x2="60" y2="61"/>
  </g>

  <!-- Bottom chevron tick (unit insignia) -->
  <g fill="#60a5fa">
    <polygon points="55,99 60,95 65,99 62,101 60,99 58,101"/>
  </g>

  <!-- Top accent (class/grade marker) -->
  <g fill="#60a5fa">
    <rect x="58" y="18" width="4" height="4" transform="rotate(45 60 20)"/>
  </g>
</svg>
