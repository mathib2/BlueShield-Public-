<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- BlueShield Sigil — "The Sigil" concept
       Design: hex-shield composite + descending chevron rune (BT + signal strength)
       Single-weight, single-color. Works 16px favicon to 256px hero.
       Color: amber #FFB000 on transparent (inherit via currentColor) -->

  <g stroke="currentColor" stroke-width="2" stroke-linejoin="miter" stroke-linecap="square" fill="none">
    <!-- Outer hex shield (flat-top hex = tactical + heraldic) -->
    <path d="M32 4 L56 18 L56 40 L32 58 L8 40 L8 18 Z"/>

    <!-- Inner bevel line (subtle depth) -->
    <path d="M32 11 L50 21.5 L50 37 L32 51 L14 37 L14 21.5 Z" stroke-width="1" opacity="0.55"/>

    <!-- Three descending chevrons (signal strength / rank insignia / BT rune abstraction) -->
    <path d="M22 26 L32 22 L42 26"/>
    <path d="M22 34 L32 30 L42 34"/>
    <path d="M22 42 L32 38 L42 42"/>
  </g>
</svg>
