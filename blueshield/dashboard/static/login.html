<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueShield - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',system-ui,sans-serif;background:#08090d;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

        /* Animated background */
        .bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden}
        .bg-grid::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(88,166,255,.06) 0%,transparent 50%)}
        .pulse-ring{position:absolute;border:1px solid rgba(88,166,255,.08);border-radius:50%;animation:radar-pulse 4s ease-out infinite}
        .pulse-ring:nth-child(1){width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:0s}
        .pulse-ring:nth-child(2){width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}
        .pulse-ring:nth-child(3){width:700px;height:700px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2s}
        .pulse-ring:nth-child(4){width:900px;height:900px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:3s}
        @keyframes radar-pulse{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.3)}}

        .login-container{position:relative;z-index:1;width:100%;max-width:400px;padding:20px}
        .login-card{background:rgba(13,17,23,.9);backdrop-filter:blur(20px);border:1px solid #21262d;border-radius:16px;padding:40px 32px;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 60px rgba(88,166,255,.04)}

        .logo{text-align:center;margin-bottom:32px}
        .logo-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:rgba(88,166,255,.1);border:2px solid rgba(88,166,255,.3);border-radius:16px;margin-bottom:12px}
        .logo-icon svg{color:#58a6ff}
        .logo h1{font-size:1.5rem;font-weight:700;letter-spacing:.5px}
        .logo h1 span{color:#58a6ff}
        .logo p{font-size:.78rem;color:#8b949e;margin-top:4px}

        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-size:.72rem;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
        .form-input{width:100%;padding:12px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
        .form-input:focus{border-color:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,.15)}
        .form-input::placeholder{color:#484f58}

        .btn-login{width:100%;padding:12px;background:#58a6ff;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px}
        .btn-login:hover{background:#79b8ff;box-shadow:0 4px 12px rgba(88,166,255,.3)}
        .btn-login:active{transform:scale(.98)}
        .btn-login:disabled{opacity:.5;cursor:not-allowed}

        .error-msg{display:none;padding:10px 14px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:8px;color:#f85149;font-size:.78rem;text-align:center;margin-bottom:16px;animation:shake .4s ease-in-out}
        .error-msg.show{display:block}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

        .footer-text{text-align:center;margin-top:24px;font-size:.68rem;color:#484f58}
        .footer-text a{color:#58a6ff;text-decoration:none}

        /* Mobile */
        @media(max-width:480px){
            .login-container{padding:16px}
            .login-card{padding:32px 24px}
        }
    </style>
</head>
<body>
    <div class="bg-grid">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6.5 6.5l11 11M6.5 17.5l11-11M12 2v20"/></svg>
                </div>
                <h1>Blue<span>Shield</span></h1>
                <p>Bluetooth Intelligence Platform v5.0</p>
            </div>

            <div class="error-msg" id="error-msg">Invalid username or password</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" autocomplete="username" autofocus required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="btn-login">Sign In</button>
            </form>

            <div class="footer-text">Research-grade Bluetooth security platform</div>
        </div>
    </div>

    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-login");
            const err = document.getElementById("error-msg");
            btn.disabled = true;
            btn.textContent = "Signing in...";
            err.classList.remove("show");

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value,
                    }),
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = "/";
                } else {
                    err.textContent = data.error || "Invalid credentials";
                    err.classList.add("show");
                }
            } catch (ex) {
                err.textContent = "Connection error";
                err.classList.add("show");
            }
            btn.disabled = false;
            btn.textContent = "Sign In";
        });
    </script>
</body>
</html>
