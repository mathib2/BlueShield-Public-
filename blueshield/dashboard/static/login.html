<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUESHIELD — Access Terminal</title>
    <link rel="icon" href="/static/img/blueshield-sigil.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg-0:#05070C;--bg-1:#0A0E16;--bg-2:#0E131D;--bg-3:#141A26;
            --tx-1:#E6EDF3;--tx-2:#8B949E;--tx-3:#484F58;
            --accent:#FFB000;--accent-dim:#B57F00;
            --ok:#3FB950;--crit:#F85149;
            --border:rgba(139,148,158,0.12);
            --border-hi:rgba(255,176,0,0.28);
        }
        html,body{height:100%}
        body{
            font-family:'Inter',system-ui,sans-serif;
            background:var(--bg-0);color:var(--tx-1);
            min-height:100vh;display:flex;flex-direction:column;
            overflow-x:hidden;
        }
        /* Classification banner */
        .class-banner{
            padding:4px 12px;text-align:center;
            font-family:'JetBrains Mono',monospace;
            font-size:10px;font-weight:700;letter-spacing:2px;
            text-transform:uppercase;
            color:#000;background:var(--ok);
        }
        /* Scanline overlay */
        .scanlines{
            position:fixed;inset:0;z-index:0;pointer-events:none;
            background:repeating-linear-gradient(
                180deg,
                transparent 0,
                transparent 3px,
                rgba(255,176,0,0.015) 3px,
                rgba(255,176,0,0.015) 4px
            );
        }
        /* Corner reticles */
        .reticle{position:fixed;width:24px;height:24px;z-index:1;opacity:0.4}
        .reticle::before,.reticle::after{
            content:'';position:absolute;background:var(--accent);
        }
        .reticle::before{width:100%;height:1px;top:0}
        .reticle::after{width:1px;height:100%;left:0;top:0}
        .reticle.tl{top:40px;left:16px}
        .reticle.tr{top:40px;right:16px;transform:scaleX(-1)}
        .reticle.bl{bottom:16px;left:16px;transform:scaleY(-1)}
        .reticle.br{bottom:16px;right:16px;transform:scale(-1,-1)}
        /* Main container */
        main{
            flex:1;display:flex;align-items:center;justify-content:center;
            padding:40px 20px;position:relative;z-index:2;
        }
        .login-card{
            width:100%;max-width:420px;
            background:var(--bg-1);
            border:1px solid var(--border);
            border-top:2px solid var(--accent);
            padding:40px 36px;
        }
        /* Branding */
        .brand{text-align:center;margin-bottom:28px}
        .brand-sigil{display:block;margin:0 auto 14px;color:var(--accent)}
        .brand-name{
            font-family:'Rajdhani','Space Grotesk',sans-serif;
            font-weight:700;font-size:28px;letter-spacing:4px;
            color:var(--tx-1);
        }
        .brand-sub{
            font-family:'JetBrains Mono',monospace;
            font-size:10px;letter-spacing:2px;
            color:var(--accent);margin-top:4px;
            text-transform:uppercase;
        }
        /* Terminal auth prompt */
        .term-prompt{
            font-family:'JetBrains Mono',monospace;
            font-size:11px;color:var(--tx-3);
            letter-spacing:1px;text-transform:uppercase;
            margin-bottom:20px;text-align:center;
        }
        .term-prompt::before{content:'>>  '}
        .term-prompt::after{content:'  <<'}
        /* Form */
        .form-group{margin-bottom:16px}
        .form-label{
            display:block;
            font-family:'JetBrains Mono',monospace;
            font-size:10px;font-weight:600;
            color:var(--tx-2);
            text-transform:uppercase;letter-spacing:1.5px;
            margin-bottom:6px;
        }
        .form-input{
            width:100%;padding:10px 12px;
            background:var(--bg-3);
            border:1px solid var(--border);
            border-radius:2px;
            color:var(--tx-1);
            font-family:'JetBrains Mono',monospace;
            font-size:13px;letter-spacing:1px;
            outline:none;
            transition:border-color .15s, background .15s;
        }
        .form-input:focus{
            border-color:var(--accent);
            background:var(--bg-2);
            box-shadow:inset 0 0 0 1px var(--accent);
        }
        .form-input::placeholder{color:var(--tx-3);letter-spacing:0.5px}
        /* Auth button */
        .btn-auth{
            width:100%;padding:12px;margin-top:12px;
            background:transparent;
            border:1px solid var(--accent);
            color:var(--accent);
            font-family:'JetBrains Mono',monospace;
            font-size:12px;font-weight:700;letter-spacing:3px;
            text-transform:uppercase;
            cursor:pointer;border-radius:2px;
            transition:background .15s, box-shadow .15s;
        }
        .btn-auth:hover{
            background:var(--accent);color:#000;
            box-shadow:0 0 14px rgba(255,176,0,0.35);
        }
        .btn-auth:active{transform:translateY(1px)}
        .btn-auth:disabled{opacity:0.4;cursor:not-allowed}
        /* Error */
        .err{
            display:none;
            padding:10px 12px;margin-bottom:14px;
            background:rgba(248,81,73,0.08);
            border-left:3px solid var(--crit);
            color:var(--crit);
            font-family:'JetBrains Mono',monospace;
            font-size:11px;letter-spacing:0.5px;
        }
        .err.show{display:block}
        /* Footer */
        .login-meta{
            margin-top:24px;text-align:center;
            font-family:'JetBrains Mono',monospace;
            font-size:9px;color:var(--tx-3);
            letter-spacing:1px;text-transform:uppercase;
        }
        .login-meta div + div{margin-top:4px}
        /* Bottom classification */
        footer{
            padding:4px 12px;text-align:center;
            font-family:'JetBrains Mono',monospace;
            font-size:10px;font-weight:700;letter-spacing:2px;
            text-transform:uppercase;
            color:#000;background:var(--ok);
        }
    </style>
</head>
<body>
    <div class="class-banner">// UNCLASSIFIED // FOR RESEARCH USE // WSU AUTHORIZED //</div>

    <div class="scanlines"></div>
    <span class="reticle tl"></span>
    <span class="reticle tr"></span>
    <span class="reticle bl"></span>
    <span class="reticle br"></span>

    <main>
        <div class="login-card">
            <div class="brand">
                <svg class="brand-sigil" width="56" height="56" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="miter" stroke-linecap="square">
                    <path d="M32 4 L56 18 L56 40 L32 58 L8 40 L8 18 Z"/>
                    <path d="M32 11 L50 21.5 L50 37 L32 51 L14 37 L14 21.5 Z" stroke-width="1" opacity="0.55"/>
                    <path d="M22 26 L32 22 L42 26"/>
                    <path d="M22 34 L32 30 L42 34"/>
                    <path d="M22 42 L32 38 L42 42"/>
                </svg>
                <div class="brand-name">BLUESHIELD</div>
                <div class="brand-sub">// BLE Threat Intelligence Platform // v7.0 //</div>
            </div>

            <div class="term-prompt">Operator authentication required</div>

            <div class="err" id="error-msg">ACCESS DENIED — invalid credentials</div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Operator ID</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter operator ID" autocomplete="username" autofocus required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Access Code</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter access code" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-auth" id="btn-auth">&gt;&gt; AUTHENTICATE &lt;&lt;</button>
            </form>

            <div class="login-meta">
                <div>Session timeout: 30 min</div>
                <div>Access logged to audit trail</div>
            </div>
        </div>
    </main>

    <footer>// UNCLASSIFIED // FOR RESEARCH USE // WSU AUTHORIZED //</footer>

    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-auth");
            const err = document.getElementById("error-msg");
            btn.disabled = true;
            btn.textContent = ">> AUTHENTICATING... <<";
            err.classList.remove("show");

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value,
                    }),
                });
                const data = await res.json();
                if (data.success) {
                    btn.textContent = ">> AUTHORIZED <<";
                    btn.style.background = "var(--ok)";
                    btn.style.borderColor = "var(--ok)";
                    btn.style.color = "#000";
                    setTimeout(() => { window.location.href = "/"; }, 300);
                } else {
                    err.textContent = "ACCESS DENIED — " + (data.error || "invalid credentials");
                    err.classList.add("show");
                }
            } catch (ex) {
                err.textContent = "ACCESS DENIED — connection error";
                err.classList.add("show");
            }
            if (!err.classList.contains("show")) return;
            btn.disabled = false;
            btn.textContent = ">> AUTHENTICATE <<";
        });
    </script>
</body>
</html>
